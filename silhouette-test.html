<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silhouette Approximation — Preview</title>
  <script src="tanks.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #090c10; color: #e6eaf0; font-family: monospace; font-size: 12px; padding: 20px; }
    h1 { margin-bottom: 6px; font-size: 16px; letter-spacing: 0.1em; }
    p  { color: #55647a; margin-bottom: 20px; font-size: 11px; }

    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
    label { color: #9ba3af; }
    input[type=range] { width: 140px; }
    span.val { color: #4c9aff; min-width: 40px; display: inline-block; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

    .card { background: #0e1116; border: 1px solid #182030; overflow: hidden; }
    .card-pair { display: grid; grid-template-columns: 1fr 1fr; }
    .card img { width: 100%; height: 100px; object-fit: cover; display: block; }
    .card img.sil { /* set by JS */ }
    .card-label { padding: 5px 8px; color: #55647a; font-size: 10px; letter-spacing: 0.08em;
                  border-top: 1px solid #182030; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <h1>SILHOUETTE APPROXIMATION — PREVIEW</h1>
  <p>This page is NOT linked from the game. Adjust sliders to tune the silhouette filter, then report back whether it's usable.</p>

  <div class="controls">
    <label>Brightness: <input type="range" id="slBr" min="0.01" max="0.25" step="0.01" value="0.07"> <span class="val" id="vBr">0.07</span></label>
    <label>Contrast: <input type="range" id="slCo" min="1" max="10" step="0.5" value="5"> <span class="val" id="vCo">5</span></label>
    <label>Saturate: <input type="range" id="slSa" min="0" max="0.5" step="0.05" value="0"> <span class="val" id="vSa">0</span></label>
    <label>Limit: <input type="range" id="slLim" min="10" max="200" step="10" value="40"> <span class="val" id="vLim">40</span></label>
    <button onclick="render()" style="padding:4px 12px;background:#243040;border:none;color:#e6eaf0;cursor:pointer;font-family:monospace;letter-spacing:0.1em;">APPLY</button>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    var tanks = window.TANKS || [];

    function nameToPath(name) {
      var s = name.toLowerCase();
      s = s.replace(/ä/g,"a").replace(/ö/g,"o").replace(/ü/g,"u").replace(/ß/g,"ss");
      s = s.replace(/\(t\)/g,"t").replace(/\(p\)/g,"p").replace(/\(h\)/g,"h");
      s = s.replace(/[^a-z0-9]+/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
      return "./images/" + s + ".jpg";
    }

    function getFilter() {
      var br = document.getElementById('slBr').value;
      var co = document.getElementById('slCo').value;
      var sa = document.getElementById('slSa').value;
      return "brightness(" + br + ") contrast(" + co + ") saturate(" + sa + ")";
    }

    ['slBr','slCo','slSa','slLim'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', function() {
        var label = id.replace('sl','').toLowerCase();
        var valId = 'v' + id.replace('sl','');
        document.getElementById(valId).textContent = this.value;
        if (id !== 'slLim') updateFilters();
      });
    });

    function updateFilters() {
      var f = getFilter();
      document.querySelectorAll('img.sil').forEach(function(img) { img.style.filter = f; });
    }

    function render() {
      var limit = parseInt(document.getElementById('slLim').value);
      var subset = tanks.slice(0, limit);
      var f = getFilter();
      var grid = document.getElementById('grid');
      grid.innerHTML = '';
      subset.forEach(function(tank) {
        var card = document.createElement('div');
        card.className = 'card';
        var pair = document.createElement('div');
        pair.className = 'card-pair';

        var orig = document.createElement('img');
        orig.src = nameToPath(tank.name);
        orig.onerror = function() { this.style.display='none'; };

        var sil = document.createElement('img');
        sil.className = 'sil';
        sil.src = nameToPath(tank.name);
        sil.style.filter = f;
        sil.onerror = function() { this.style.display='none'; };

        pair.appendChild(orig);
        pair.appendChild(sil);

        var lbl = document.createElement('div');
        lbl.className = 'card-label';
        lbl.textContent = tank.name + ' · ' + tank.nation;

        card.appendChild(pair);
        card.appendChild(lbl);
        grid.appendChild(card);
      });
    }

    render();
  </script>
</body>
</html>
